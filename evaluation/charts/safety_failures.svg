<svg xmlns="http://www.w3.org/2000/svg" width="980" height="338" viewBox="0 0 980 338" role="img" aria-labelledby="title desc">
<title id="title">Baseline Safety Failure Counts</title>
<desc id="desc">Original PaddleOCR-VL baseline safety failure counts on final 758-sample evaluation set.</desc>
<rect width="100%" height="100%" fill="#fbfaf7"/>
<style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC",Arial,sans-serif}.title{font-size:26px;font-weight:700;fill:#111827}.sub{font-size:15px;fill:#6b7280}.label{font-size:15px;fill:#111827}.value{font-size:15px;font-weight:650;fill:#111827}.axis{stroke:#e5e7eb;stroke-width:1}.note{font-size:13px;fill:#6b7280}</style>
<text class="title" x="28" y="38">Baseline Output Risk Counts</text>
<text class="sub" x="28" y="64">Final 758 set; LoRA result pending</text>
<line class="axis" x1="255" y1="74" x2="790" y2="74"/>
<text class="label" x="28" y="114">replacement</text>
<rect x="255" y="92" width="25" height="32" rx="7" fill="#dc2626" opacity="0.88"/>
<text class="value" x="292" y="114">16</text>
<text class="label" x="28" y="162">LaTeX-like</text>
<rect x="255" y="140" width="164" height="32" rx="7" fill="#f97316" opacity="0.88"/>
<text class="value" x="431" y="162">105</text>
<text class="label" x="28" y="210">extra Latin</text>
<rect x="255" y="188" width="500" height="32" rx="7" fill="#7c3aed" opacity="0.88"/>
<text class="value" x="767" y="210">321</text>
<text class="label" x="28" y="258">long prediction</text>
<rect x="255" y="236" width="53" height="32" rx="7" fill="#0891b2" opacity="0.88"/>
<text class="value" x="320" y="258">34</text>
<text class="note" x="28" y="306">风险计数越低越好。未微调基座有明显输出漂移，LoRA 微调后结果待回填。</text>
</svg>
