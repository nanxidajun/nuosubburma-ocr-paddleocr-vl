<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
<title id="title">Baseline Avg NED by Source</title>
<desc id="desc">Original PaddleOCR-VL baseline source-level NED summary on the final 758-sample evaluation set.</desc>
<rect width="100%" height="100%" fill="#fbfaf7"/>
<style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC",Arial,sans-serif}.title{font-size:26px;font-weight:700;fill:#111827}.sub{font-size:15px;fill:#6b7280}.label{font-size:15px;fill:#111827}.value{font-size:15px;font-weight:650;fill:#111827}.axis{stroke:#e5e7eb;stroke-width:1}.note{font-size:13px;fill:#6b7280}</style>
<text class="title" x="28" y="38">Baseline Avg NED by Source</text>
<text class="sub" x="28" y="64">Source-level chart is a diagnostic view; LoRA result pending</text>
<line class="axis" x1="290" y1="74" x2="790" y2="74"/>
<text class="label" x="28" y="114">旧印刷主体来源</text>
<rect x="290" y="92" width="395" height="30" rx="7" fill="#2563eb" opacity="0.88"/>
<text class="value" x="697" y="113">high NED baseline</text>
<text class="label" x="28" y="162">新印刷正文/工具书</text>
<rect x="290" y="140" width="410" height="30" rx="7" fill="#16a34a" opacity="0.88"/>
<text class="value" x="712" y="161">high NED baseline</text>
<text class="label" x="28" y="210">手写拍照</text>
<rect x="290" y="188" width="500" height="30" rx="7" fill="#7c3aed" opacity="0.88"/>
<text class="value" x="802" y="209">hardest</text>
<text class="label" x="28" y="258">屏幕拍照</text>
<rect x="290" y="236" width="496" height="30" rx="7" fill="#f97316" opacity="0.88"/>
<text class="value" x="798" y="257">hardest</text>
<text class="label" x="28" y="306">场景照片 / 标牌</text>
<rect x="290" y="284" width="322" height="30" rx="7" fill="#0891b2" opacity="0.88"/>
