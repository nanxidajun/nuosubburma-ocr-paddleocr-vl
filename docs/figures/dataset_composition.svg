<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">NuosuBburma OCR evaluation dataset composition</title>
  <desc id="desc">Final evaluation dataset composition for the 603 real samples.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
    .bg{fill:#fbfaf7}.title{font-size:28px;font-weight:780;fill:#172026}.sub{font-size:15px;fill:#64707d}
    .panel{fill:#fff;stroke:#d9e1de;stroke-width:1.3;rx:14}.label{font-size:16px;font-weight:760;fill:#172026}
    .note{font-size:13px;fill:#637081}.small{font-size:13px;fill:#172026;font-weight:760}.muted{fill:#eef3f1}.accent{fill:#176b87}.accent2{fill:#12a37f}.accent3{fill:#f0a22e}
  </style>
  <rect class="bg" width="1120" height="540"/>
  <text class="title" x="40" y="48">最终评估集构成</text>
  <text class="sub" x="40" y="74">603 条真实来源主评估样本；合成样本不进入主评估。</text>

  <rect class="panel" x="40" y="112" width="1040" height="370"/>

  <text class="label" x="72" y="154">视觉场景分布</text>
  <rect class="muted" x="220" y="132" width="820" height="30" rx="7"/>
  <rect class="accent" x="220" y="132" width="160" height="30" rx="7"/>
  <text class="small" x="400" y="152">新印刷 309 / 旧书 235 / 规范手写 53 / 实拍与屏幕 6</text>

  <text class="label" x="72" y="250">输入粒度</text>
  <rect class="muted" x="220" y="228" width="820" height="30" rx="7"/>
  <rect class="accent2" x="220" y="228" width="160" height="30" rx="7"/>
  <text class="small" x="400" y="248">line 515 / region 84 / page 4</text>

  <text class="label" x="72" y="344">文字混合</text>
  <rect class="muted" x="220" y="322" width="820" height="30" rx="7"/>
  <rect class="accent3" x="220" y="322" width="160" height="30" rx="7"/>
  <text class="small" x="400" y="342">yi 321 / yi_han 265 / yi_han_latin 17</text>

  <text class="label" x="72" y="438">难度分层</text>
  <rect class="muted" x="220" y="416" width="820" height="30" rx="7"/>
  <rect class="accent" x="220" y="416" width="160" height="30" rx="7"/>
  <text class="small" x="400" y="436">easy 172 / medium 324 / hard 107</text>

  <text class="note" x="72" y="512">最终文档按四个维度报告构成：视觉场景、输入粒度、文字混合和难度分层。</text>
</svg>
