<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="《雪族子史篇》整页 OCR 对比：页面切割后 Avg NED 0.0654，直接整页 OCR Avg NED 0.5540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7ec"/>
      <stop offset="100%" stop-color="#efe2cc"/>
    </linearGradient>
    <linearGradient id="cut" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14a392"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="direct" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#2b2115" flood-opacity=".14"/>
    </filter>
    <style>
      .title { font: 700 28px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #17211c; }
      .subtitle { font: 400 15px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #65736c; }
      .label { font: 600 16px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #17211c; }
      .small { font: 400 13px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #65736c; }
      .num { font: 800 22px "Avenir Next", "PingFang SC", sans-serif; fill: #17211c; }
      .white { fill: #fffaf0; }
      .reason { font: 600 14px "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #0f766e; }
    </style>
  </defs>
  <rect width="980" height="360" rx="28" fill="url(#bg)"/>
  <rect x="28" y="26" width="924" height="308" rx="24" fill="#fffaf0" opacity=".88" filter="url(#shadow)"/>

  <text x="56" y="70" class="title">《雪族子史篇》整页 OCR 对比</text>
  <text x="56" y="100" class="subtitle">评估集 65 页整页样本；NED 越低表示输出越接近人工 GT。</text>

  <g transform="translate(56 142)">
    <text x="0" y="0" class="label">页面切割后识别</text>
    <text x="804" y="0" class="num" text-anchor="end">0.0654</text>
    <rect x="0" y="18" width="805" height="34" rx="17" fill="#eadfca"/>
    <rect x="0" y="18" width="95" height="34" rx="17" fill="url(#cut)"/>
    <text x="112" y="41" class="small">Paddle PP-DocLayout → OCR 单元 → 页面文本合并</text>
  </g>

  <g transform="translate(56 220)">
    <text x="0" y="0" class="label">直接整页 OCR</text>
    <text x="804" y="0" class="num" text-anchor="end">0.5540</text>
    <rect x="0" y="18" width="805" height="34" rx="17" fill="#eadfca"/>
    <rect x="0" y="18" width="805" height="34" rx="17" fill="url(#direct)"/>
    <text x="22" y="41" class="white" style="font: 700 13px 'PingFang SC', sans-serif;">整页图像直接进入 OCR 模型</text>
  </g>

  <g transform="translate(56 300)">
    <rect x="0" y="-20" width="170" height="34" rx="17" fill="#d8f2ec"/>
    <text x="18" y="2" class="reason">版式顺序更稳</text>
    <rect x="190" y="-20" width="170" height="34" rx="17" fill="#d8f2ec"/>
    <text x="208" y="2" class="reason">混排单元更细</text>
    <rect x="380" y="-20" width="205" height="34" rx="17" fill="#d8f2ec"/>
    <text x="398" y="2" class="reason">非文字图案更少进入 OCR</text>
  </g>
</svg>
