<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">规范彝文 OCR / NuosuBburma OCR page-level recognition</title>
  <desc id="desc">Page-level OCR from PDF or image input to cropped lines, OCR, merged text, pronunciation and verification.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52606d"/>
    </marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .bg{fill:#fbfaf7}
      .title{font-size:28px;font-weight:760;fill:#172026}
      .sub{font-size:15px;fill:#64707d}
      .card{fill:#fff;stroke:#d6dedb;stroke-width:1.4;rx:14}
      .card-main{fill:#f7fffc;stroke:#12a37f;stroke-width:1.8;rx:14}
      .label{font-size:18px;font-weight:760;fill:#172026}
      .body{font-size:13px;fill:#52606d}
      .tag{font-size:12px;font-weight:720;fill:#0b5c4a}
      .chip{fill:#e7f6f0;stroke:#b9ded1;rx:8}
      .risk{font-size:13px;fill:#7a4a09;font-weight:720}
      .riskbox{fill:#fff8e7;stroke:#e8c575;rx:12}
      .line{stroke:#52606d;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1120" height="360"/>
  <text class="title" x="40" y="48">从真实资料到可核验文本</text>
  <text class="sub" x="40" y="74">页面切割、识别、合并、注音和人工核验共同支撑真实资料数字化。</text>

  <rect class="card" x="40" y="116" width="188" height="120"/>
  <text class="label" x="64" y="152">PDF / 图片</text>
  <text class="body" x="64" y="180">旧书扫描、教材页面</text>
  <text class="body" x="64" y="204">手写稿、场景照片</text>
  <rect class="chip" x="64" y="255" width="108" height="26"/>
  <text class="tag" x="76" y="273">真实来源输入</text>

  <path class="line" d="M 238 176 H 292"/>
  <rect class="card-main" x="304" y="116" width="188" height="120"/>
  <text class="label" x="328" y="152">页面切割与核验</text>
  <text class="body" x="328" y="180">整页切成 line / region</text>
  <text class="body" x="328" y="204">保留 index 和阅读顺序</text>
  <rect class="chip" x="328" y="255" width="112" height="26"/>
  <text class="tag" x="340" y="273">切得好再识别</text>

  <path class="line" d="M 502 176 H 556"/>
  <rect class="card" x="568" y="116" width="188" height="120"/>
  <text class="label" x="592" y="152">LoRA OCR</text>
  <text class="body" x="592" y="180">PaddleOCR-VL-1.6 0.9B</text>
  <text class="body" x="592" y="204">统一图像 OCR 输入</text>
  <rect class="chip" x="592" y="255" width="94" height="26"/>
  <text class="tag" x="604" y="273">Unicode 输出</text>

  <path class="line" d="M 766 176 H 820"/>
  <rect class="card-main" x="832" y="116" width="228" height="120"/>
  <text class="label" x="856" y="152">合并、注音、核验</text>
  <text class="body" x="856" y="180">按 index 合并页面文本</text>
  <text class="body" x="856" y="204">可选罗马注音和人工核验</text>
  <rect class="chip" x="856" y="255" width="130" height="26"/>
  <text class="tag" x="868" y="273">检字与语料入口</text>

  <rect class="riskbox" x="40" y="292" width="1020" height="42"/>
  <text class="risk" x="64" y="318">边界策略：复杂整页不过度声称；line / region 是当前稳定入口；替换符、LaTeX 化、多余 Latin、超长输出全部进入核验。</text>
</svg>
