### data
train_dataset_type: messages
eval_dataset_type: messages
train_dataset_path: jsonl/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: jsonl/eval_yi.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 16384
padding_free: True
truncate_packing: False
dataloader_num_workers: 8
mix_strategy: concat
template_backend: custom
template: paddleocr_vl

### model
model_name_or_path: PaddlePaddle/PaddleOCR-VL
_attn_implementation: flashmask
lora: true
lora_rank: 8

### finetuning
stage: VL-SFT
fine_tuning: lora
seed: 23
do_train: true
do_eval: false
per_device_eval_batch_size: 4
per_device_train_batch_size: 4
num_train_epochs: 2
max_steps: -1
max_estimate_samples: 500
eval_steps: 64
evaluation_strategy: "no"
save_steps: 64
save_strategy: steps
save_total_limit: 3
logging_steps: 1
gradient_accumulation_steps: 16
logging_dir: outputs/nuosubburma_lora/visualdl_logs/
output_dir: outputs/nuosubburma_lora
disable_tqdm: true
eval_accumulation_steps: 16

### train
lr_scheduler_type: cosine
warmup_ratio: 0.01
learning_rate: 5.0e-4
min_lr: 5.0e-5

### optimizer
weight_decay: 0.1
adam_epsilon: 1.0e-8
adam_beta1: 0.9
adam_beta2: 0.95

### performance
tensor_model_parallel_size: 1
pipeline_model_parallel_size: 1
sharding: stage2
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
bf16: true
fp16_opt_level: O2

### save
overwrite_output_dir: true
unified_checkpoint: true
save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"
